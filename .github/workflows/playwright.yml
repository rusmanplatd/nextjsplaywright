name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js (match local version) ───────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Install npm dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install Playwright browsers ───────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── 5. Build Next.js app ─────────────────────────────────────────────────
      - name: Build Next.js app
        run: npm run build

      # ── 6. Start Next.js production server in background ─────────────────────
      - name: Start Next.js server
        run: npm run start &
        env:
          PORT: 3000

      # ── 7. Wait until the server is accepting connections ────────────────────
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 120000

      # ── 8. Run Playwright tests ───────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      # ── 9. Upload HTML report ─────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── 10. Upload screenshots & videos ──────────────────────────────────────
      - name: Upload test results (screenshots & videos)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
